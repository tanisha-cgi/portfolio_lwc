<template>
    <lightning-card title="My Portfolio" icon-name="standard:account">
        <template if:true={hasAccount}>
            <div class="slds-p-around_medium portfolio-root">

                <!-- ── HERO: Photo + Basic Info ─────────────────────────── -->
                <div class="hero-grid">
                    <div class="hero-photo-col">
                        <template if:true={account.Photo_URL__c}>
                            <img src={account.Photo_URL__c} alt={account.Name} class="portfolio-photo" />
                        </template>
                        <template if:false={account.Photo_URL__c}>
                            <div class="photo-placeholder">
                                <lightning-icon icon-name="utility:user" size="large"></lightning-icon>
                            </div>
                        </template>
                    </div>

                    <div class="hero-info-col">
                        <h1 class="hero-name">{account.Name}</h1>
                        <template if:true={account.Professional_Title__c}>
                            <p class="hero-title">{account.Professional_Title__c}</p>
                        </template>
                        <template if:true={account.Description}>
                            <p class="hero-bio">{account.Description}</p>
                        </template>

                        <!-- Skills badges -->
                        <template if:true={skills.length}>
                            <div class="skills-row">
                                <template for:each={skills} for:item="skill">
                                    <span key={skill.key} class="skill-badge">{skill.label}</span>
                                </template>
                            </div>
                        </template>

                        <!-- Contact links -->
                        <div class="contact-row">
                            <template if:true={account.Email__c}>
                                <a href={emailLink} class="contact-chip">
                                    <lightning-icon icon-name="utility:email" size="xx-small"></lightning-icon>
                                    <span>{account.Email__c}</span>
                                </a>
                            </template>
                            <template if:true={account.Phone}>
                                <span class="contact-chip">
                                    <lightning-icon icon-name="utility:call" size="xx-small"></lightning-icon>
                                    <span>{account.Phone}</span>
                                </span>
                            </template>
                            <template if:true={account.Website}>
                                <a href={account.Website} target="_blank" class="contact-chip">
                                    <lightning-icon icon-name="utility:world" size="xx-small"></lightning-icon>
                                    <span>Website</span>
                                </a>
                            </template>
                            <template if:true={account.LinkedIn_URL__c}>
                                <a href={account.LinkedIn_URL__c} target="_blank" class="contact-chip chip-linkedin">LinkedIn</a>
                            </template>
                            <template if:true={account.GitHub_URL__c}>
                                <a href={account.GitHub_URL__c} target="_blank" class="contact-chip chip-github">GitHub</a>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- ── PROJECTS ──────────────────────────────────────────── -->
                <section class="section">
                    <h2 class="section-heading">Projects</h2>
                    <div class="projects-grid">
                        <template for:each={projects} for:item="proj">
                            <div key={proj.id} class="project-card">
                                <h3 class="project-title">{proj.title}</h3>
                                <p class="project-desc">{proj.description}</p>
                                <p class="project-tech">{proj.tech}</p>
                                <a href={proj.link} target="_blank" class="project-link">View Project →</a>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- ── EXPERIENCE ────────────────────────────────────────── -->
                <section class="section">
                    <h2 class="section-heading">Experience</h2>
                    <div class="timeline">
                        <template for:each={experience} for:item="exp">
                            <div key={exp.id} class="timeline-item">
                                <div class="timeline-dot"></div>
                                <div class="timeline-body">
                                    <div class="timeline-header">
                                        <span class="timeline-role">{exp.role}</span>
                                        <span class="timeline-duration">{exp.duration}</span>
                                    </div>
                                    <p class="timeline-company">{exp.company}</p>
                                    <p class="timeline-desc">{exp.description}</p>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>

                <!-- ── EDUCATION + CERTIFICATIONS (2-col grid) ───────────── -->
                <div class="two-col-grid">
                    <section class="section">
                        <h2 class="section-heading">Education</h2>
                        <template for:each={education} for:item="edu">
                            <div key={edu.id} class="info-card">
                                <p class="info-card-title">{edu.degree}</p>
                                <p class="info-card-sub">{edu.institution}</p>
                                <p class="info-card-meta">{edu.year} &nbsp;|&nbsp; {edu.grade}</p>
                            </div>
                        </template>
                    </section>

                    <section class="section">
                        <h2 class="section-heading">Certifications</h2>
                        <template for:each={certifications} for:item="cert">
                            <div key={cert.id} class="info-card">
                                <p class="info-card-title">{cert.name}</p>
                                <p class="info-card-sub">{cert.issuer}</p>
                                <p class="info-card-meta">{cert.year}</p>
                            </div>
                        </template>
                    </section>
                </div>

            </div>
        </template>

        <template if:true={error}>
            <div class="slds-p-around_medium slds-text-color_error">{error}</div>
        </template>

        <template if:true={showEmptyState}>
            <div class="slds-p-around_medium">
                No portfolio account found. Mark an Account's "Is Portfolio Account" checkbox to display it here.
            </div>
        </template>
    </lightning-card>
</template>
